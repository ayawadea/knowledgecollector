
                 
          
    
     <!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knowledge Collector | جامع المعرفة</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #4a90e2;
            --bg-color: #f4f7f6;
            --text-color: #333;
            --card-bg: #ffffff;
        }
        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 600px;
            width: 100%;
            background: var(--card-bg);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 25px;
        }
        .input-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        textarea, input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-family: 'Tajawal', sans-serif;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #357abd;
        }
        hr {
            margin: 30px 0;
            border: 0;
            border-top: 1px solid #eee;
        }
        .notes-list {
            margin-top: 20px;
        }
        .note-item {
            background: #f9f9f9;
            padding: 15px;
            border-right: 5px solid var(--primary-color);
            margin-bottom: 15px;
            border-radius: 5px;
            position: relative;
        }
        .note-tag {
            font-size: 12px;
            background: #e1f0ff;
            color: var(--primary-color);
            padding: 2px 8px;
            border-radius: 10px;
            display: inline-block;
            margin-bottom: 8px;
        }
        .delete-btn {
            color: #e74c3c;
            cursor: pointer;
            float: left;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>جامع المعرفة 🦷</h1>
    
    <div class="input-group">
        <label>الموضوع / العنوان</label>
        <input type="text" id="noteTitle" placeholder="مثلاً: ترميم العصب، بحث الأوكسجين..">
    </div>

    <div class="input-group">
        <label>التصنيف</label>
        <select id="noteCategory">
            <option value="طب أسنان ترميمي">طب أسنان ترميمي</option>
            <option value="جراحة وتجميل">جراحة وتجميل</option>
            <option value="أبحاث علمية">أبحاث علمية</option>
            <option value="عام">عام</option>
        </select>
    </div>

    <div class="input-group">
        <label>الملاحظة</label>
        <textarea id="noteContent" rows="4" placeholder="اكتبي تفاصيل الملاحظة هنا..."></textarea>
    </div>

    <button onclick="saveNote()">حفظ الملاحظة ✅</button>

    <hr>

    <h2>الملاحظات المحفوظة 📋</h2>
    <div id="notesList" class="notes-list">
        </div>
</div>

<script>
    // وظيفة الحفظ في التخزين المحلي (LocalStorage)
    function saveNote() {
        const title = document.getElementById('noteTitle').value;
        const category = document.getElementById('noteCategory').value;
        const content = document.getElementById('noteContent').value;

        if (!title || !content) {
            alert("يرجى ملء العنوان والمحتوى!");
            return;
        }

        const note = {
            id: Date.now(),
            title,
            category,
            content,
            date: new Date().toLocaleDateString('ar-EG')
        };

        let notes = JSON.parse(localStorage.getItem('myNotes')) || [];
        notes.unshift(note);
        localStorage.setItem('myNotes', JSON.stringify(notes));

        // مسح الخانات بعد الحفظ
        document.getElementById('noteTitle').value = '';
        document.getElementById('noteContent').value = '';

        displayNotes();
    }

    // وظيفة عرض الملاحظات
    function displayNotes() {
        const notesList = document.getElementById('notesList');
        const notes = JSON.parse(localStorage.getItem('myNotes')) || [];
        
        notesList.innerHTML = '';

        notes.forEach(note => {
            const noteDiv = document.createElement('div');
            noteDiv.className = 'note-item';
            noteDiv.innerHTML = `
                <span class="note-tag">${note.category}</span>
                <span class="delete-btn" onclick="deleteNote(${note.id})">حذف 🗑️</span>
                <h3 style="margin: 5px 0;">${note.title}</h3>
                <p style="white-space: pre-wrap;">${note.content}</p>
                <small style="color: #888;">التاريخ: ${note.date}</small>
            `;
            notesList.appendChild(noteDiv);
        });
    }

    // وظيفة الحذف
    function deleteNote(id) {
        let notes = JSON.parse(localStorage.getItem('myNotes')) || [];
        notes = notes.filter(n => n.id !== id);
        localStorage.setItem('myNotes', JSON.stringify(notes));
        displayNotes();
    }

    // عرض الملاحظات عند فتح الصفحة
    displayNotes();
</script>

</body>
</html>
